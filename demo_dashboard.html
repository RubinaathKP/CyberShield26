<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberShield — Threat Detection Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color:#0F172A; color:#E2E8F0; font-family:'Inter',sans-serif; }
    .panel { background-color:#1E293B; border:1px solid #334155; border-radius:8px; }
    .card  { background-color:#263248; border:1px solid #334155; border-radius:6px; }
    .badge-critical { background:#7F1D1D; color:#FCA5A5; }
    .badge-high     { background:#7C2D12; color:#FED7AA; }
    .badge-medium   { background:#713F12; color:#FDE68A; }
    .badge-low      { background:#14532D; color:#86EFAC; }
    .shap-positive { background:#EF4444; }
    .shap-negative { background:#3B82F6; }
    .hp-rce  { color:#F87171; }
    .hp-cred { color:#FB923C; }
    .hp-enum { color:#FCD34D; }
    .hp-path { color:#A78BFA; }
    ::-webkit-scrollbar       { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:#1E293B; }
    ::-webkit-scrollbar-thumb { background:#475569; border-radius:2px; }
    .pipe-bar { transition: width 0.5s ease; }
    @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:.55} }
    .pulse-crit { animation:pulse-red 1.4s ease-in-out infinite; }
    .tab-active   { color:#60A5FA; border-bottom:2px solid #3B82F6; }
    .tab-inactive { color:#64748B; border-bottom:2px solid transparent; }
    .sc-critical { border-left:3px solid #EF4444; }
    .sc-high     { border-left:3px solid #F97316; }
    .sc-medium   { border-left:3px solid #EAB308; }
    .sc-low      { border-left:3px solid #22C55E; }
    .col-attack { border:2px solid #DC2626; background:#1C1215; }
    .col-benign { border:2px solid #16A34A; background:#111C14; }
    .result-pass { background:#0D2015; border-left:3px solid #22C55E; }
    .result-fail { background:#1C0808; border-left:3px solid #EF4444; }
    .result-warn { background:#1C1408; border-left:3px solid #EAB308; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API = 'http://localhost:8000';

const SCENARIOS = [
  { id: 'scenario_01_portScan', name: 'Port Scan', expected: 'MEDIUM', icon: '🔍' },
  { id: 'scenario_02_meterpreter', name: 'Meterpreter', expected: 'CRITICAL', icon: '💀' },
  { id: 'scenario_03_c2_beaconing', name: 'C2 Beaconing', expected: 'HIGH', icon: '📡' },
  { id: 'scenario_04_benign_admin', name: 'Benign Admin', expected: 'LOW', icon: '👤' },
  { id: 'scenario_05_hydra_brute', name: 'Hydra Brute', expected: 'HIGH', icon: '🔨' }
];

async function callAnalyze(scenario_id) {
  const scen = await fetch(`/scenarios/${scenario_id}.json`).then(r => r.json());
  const res = await fetch(`${API}/predict`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(scen)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function App() {
  const [activeTab, setActiveTab] = useState('live');
  const [alerts, setAlerts] = useState([]);
  const [metrics, setMetrics] = useState({});
  const [hpEvents, setHpEvents] = useState([]);

  useEffect(() => {
    const id = setInterval(async () => {
      try {
        const [m, h] = await Promise.all([
          fetch(`${API}/metrics`).then(r => r.json()),
          fetch(`${API}/honeypot/log?limit=10`).then(r => r.json())
        ]);
        setMetrics(m);
        setHpEvents(h);
      } catch(_) {}
    }, 3000);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      <header className="border-b border-slate-700 px-5 py-2.5 flex items-center gap-4 shrink-0" style={{background:'#0F172A'}}>
        <span className="text-sm font-bold text-white uppercase tracking-widest">CyberShield Demo</span>
        <nav className="flex ml-4">
          {['live', 'demo'].map(t => (
            <button key={t} onClick={() => setActiveTab(t)} className={`px-3 py-1 text-xs font-medium border-b-2 ${activeTab === t ? 'tab-active' : 'tab-inactive'}`}>
              {t.toUpperCase()}
            </button>
          ))}
        </nav>
      </header>

      <div className="flex-1 overflow-hidden p-4">
        {activeTab === 'live' && (
          <div className="grid grid-cols-2 gap-4 h-full">
            <div className="panel p-4 flex flex-col">
              <h2 className="text-sm font-bold mb-4">Live Alerts</h2>
              <div className="flex-1 overflow-y-auto space-y-2">
                {alerts.map((a, i) => (
                  <div key={i} className={`p-2 rounded text-xs card border-l-4 ${a.threat_level === 'CRITICAL' ? 'border-red-600' : 'border-blue-600'}`}>
                    {a.threat_level} - {a.scenario_name || a.entity_id} - Score: {a.final_score.toFixed(3)}
                  </div>
                ))}
              </div>
            </div>
            <div className="panel p-4 overflow-auto">
              <h2 className="text-sm font-bold mb-4">System Metrics</h2>
              <pre className="text-xs text-green-400">{JSON.stringify(metrics, null, 2)}</pre>
            </div>
          </div>
        )}
        {activeTab === 'demo' && (
          <div className="space-y-4 overflow-y-auto h-full">
            {SCENARIOS.map(sc => (
              <div key={sc.id} className="panel p-4 flex items-center justify-between">
                <div>
                  <span className="text-lg mr-2">{sc.icon}</span>
                  <span className="font-bold">{sc.name}</span>
                </div>
                <button onClick={async () => {
                  const res = await callAnalyze(sc.id);
                  setAlerts(prev => [{...res, scenario_name: sc.name}, ...prev]);
                }} className="bg-blue-600 px-4 py-1 rounded text-xs">Run Scenario</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
