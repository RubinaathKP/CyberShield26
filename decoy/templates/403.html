{% extends 'base.html' %}
{% block title %}403 Forbidden — Nexus Portal{% endblock %}

{% block body %}
<div class="min-h-screen bg-gray-950 flex items-center justify-center px-6">
  <div class="text-center max-w-md">
    <div class="w-16 h-16 bg-red-900/40 border border-red-800 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4
                 c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>

    <p class="text-red-400 text-sm font-semibold uppercase tracking-widest mb-2">
      Access Denied
    </p>
    <h1 class="text-4xl font-bold text-white mb-3">403</h1>
    <p class="text-gray-400 text-sm mb-8">
      You do not have permission to access this resource.<br>
      This incident has been logged and reported to the security team.
    </p>

    <a href="/dashboard"
       class="inline-flex items-center gap-2 bg-gray-800 hover:bg-gray-700 text-white
              text-sm font-medium px-5 py-2.5 rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Back to Dashboard
    </a>
  </div>
</div>
{% endblock %}
